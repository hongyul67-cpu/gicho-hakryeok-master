<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기초학력 마스터 - 국영수 학습·진단</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --kor:#4c6ef5; --eng:#12b886; --math:#f76707;
    --bg:#f4f6fb; --card:#ffffff; --text:#22262e; --sub:#6b7280;
    --ok:#2f9e44; --bad:#e03131; --border:#e3e6ec;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5;
  }
  .wrap{max-width:820px; margin:0 auto; padding:0 16px 80px;}
  header.top{
    text-align:center; padding:28px 16px 16px;
  }
  header.top h1{margin:0 0 6px; font-size:28px;}
  header.top p{margin:0; color:var(--sub); font-size:14px;}

  /* 최상단 모드 네비게이션 */
  #modeNav{
    position:sticky; top:0; z-index:10; background:var(--bg); padding:10px 0 14px;
    display:flex; gap:8px; max-width:820px; margin:0 auto; padding-left:16px; padding-right:16px;
  }
  #modeNav button{
    flex:1; padding:14px; border-radius:12px; font-size:15px; background:#e9ecf3; color:var(--sub);
    border:2px solid transparent;
  }
  #modeNav button.active{background:#fff; color:var(--text); border-color:#4c6ef5; box-shadow:0 2px 8px rgba(76,110,245,.18);}

  .card{background:var(--card); border-radius:16px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,.06); margin-bottom:20px;}

  /* 시작 화면 */
  .field{margin-bottom:16px;}
  .field label{display:block; font-weight:700; margin-bottom:6px; font-size:14px;}
  .field input[type=text]{
    width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:10px; font-size:16px;
  }
  .subject-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px;}
  .subject-box{
    border:2px solid var(--border); border-radius:12px; padding:16px; text-align:center; cursor:pointer;
    transition:.15s; user-select:none; font-weight:700;
  }
  .subject-box.on{border-color:var(--kor); background:#edf1ff; box-shadow:0 0 0 2px var(--kor) inset;}
  .subject-box[data-s=eng].on{border-color:var(--eng); background:#e6fbf3; box-shadow:0 0 0 2px var(--eng) inset;}
  .subject-box[data-s=math].on{border-color:var(--math); background:#fff2e8; box-shadow:0 0 0 2px var(--math) inset;}
  .subject-box .cnt{display:block; font-weight:400; font-size:12px; color:var(--sub); margin-top:4px;}

  .level-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .level-box{
    border:2px solid var(--border); border-radius:12px; padding:12px; text-align:center; cursor:pointer;
    transition:.15s; user-select:none; font-weight:700; font-size:14px; color:var(--sub);
  }
  .level-box.on{border-color:#7048e8; background:#f2ecff; color:#5f3dc4; box-shadow:0 0 0 2px #7048e8 inset;}

  button{
    font-family:inherit; cursor:pointer; border:none; border-radius:10px; font-weight:700;
  }
  .btn-main{
    display:block; width:100%; padding:16px; font-size:17px; background:linear-gradient(135deg,#4c6ef5,#4263eb);
    color:#fff; margin-top:20px; box-shadow:0 6px 16px rgba(76,110,245,.35);
  }
  .btn-main:disabled{background:#c9ccd4; box-shadow:none; cursor:not-allowed;}
  .btn-ghost{
    padding:12px 18px; background:#eef0f4; color:var(--text); font-size:14px;
  }

  /* 퀴즈 화면 */
  .section-title{
    display:flex; align-items:center; gap:10px; margin:28px 0 14px; font-size:19px; font-weight:800;
  }
  .section-title .dot{width:12px; height:12px; border-radius:50%;}
  .section-title[data-s=kor] .dot{background:var(--kor);}
  .section-title[data-s=eng] .dot{background:var(--eng);}
  .section-title[data-s=math] .dot{background:var(--math);}

  .qcard{border:1px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:12px; background:#fff;}
  .qcard .qnum{font-size:12px; color:var(--sub); font-weight:700; margin-bottom:4px;}
  .qcard .qtext{font-size:16px; font-weight:700; margin-bottom:12px; white-space:pre-wrap;}
  .choices{display:flex; flex-direction:column; gap:8px;}
  .choice{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border:1.5px solid var(--border);
    border-radius:8px; cursor:pointer; font-size:14px;
  }
  .choice input{accent-color:#4c6ef5;}
  .choice.checked{border-color:#4c6ef5; background:#f2f4ff;}
  .short-input{
    width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:15px;
  }

  #progressBar{position:sticky; top:56px; z-index:5; background:var(--bg); padding:10px 0;}
  #progressBar .bar{height:8px; background:#e3e6ec; border-radius:6px; overflow:hidden;}
  #progressBar .fill{height:100%; background:linear-gradient(90deg,#4c6ef5,#12b886,#f76707); width:0%; transition:.2s;}
  #progressBar .label{font-size:12px; color:var(--sub); margin-top:4px; text-align:right;}

  /* 결과 화면 */
  #resultCapture{background:#fff; border-radius:16px; padding:28px; }
  .result-head{text-align:center; margin-bottom:20px;}
  .result-head h2{margin:0 0 4px; font-size:22px;}
  .result-head .meta{color:var(--sub); font-size:13px;}
  .score-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-bottom:20px;}
  .score-box{border-radius:12px; padding:16px; text-align:center; color:#fff;}
  .score-box.kor{background:linear-gradient(135deg,#4c6ef5,#3b5bdb);}
  .score-box.eng{background:linear-gradient(135deg,#12b886,#099268);}
  .score-box.math{background:linear-gradient(135deg,#f76707,#e8590c);}
  .score-box.total{background:linear-gradient(135deg,#495057,#212529);}
  .score-box .name{font-size:13px; opacity:.9; margin-bottom:4px;}
  .score-box .val{font-size:26px; font-weight:800;}
  .score-box .sub{font-size:11px; opacity:.85;}

  .review-item{
    display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px;
  }
  .review-item:last-child{border-bottom:none;}
  .review-item .mark{width:22px; flex:0 0 22px; text-align:center; font-weight:800;}
  .review-item.ok .mark{color:var(--ok);}
  .review-item.bad .mark{color:var(--bad);}
  .review-item .qt{flex:1;}
  .review-item .ans{color:var(--sub); font-size:12px; margin-top:2px;}
  .review-item .ans b{color:var(--bad);}
  .review-item .ans b.correct{color:var(--ok);}

  .result-actions{display:flex; gap:10px; margin-top:24px; flex-wrap:wrap;}
  .result-actions button{flex:1; min-width:140px; padding:14px; font-size:15px;}
  .btn-save{background:linear-gradient(135deg,#4c6ef5,#4263eb); color:#fff;}
  .btn-retry{background:#eef0f4; color:var(--text);}

  /* 학습 화면 */
  .study-tabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .study-tabs button{padding:10px 16px; background:#eef0f4; color:var(--sub); font-size:14px;}
  .study-tabs button.active{color:#fff;}
  .study-tabs button.active[data-s=kor]{background:var(--kor);}
  .study-tabs button.active[data-s=eng]{background:var(--eng);}
  .study-tabs button.active[data-s=math]{background:var(--math);}

  .cat-chips{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
  .cat-chips button{padding:8px 14px; background:#fff; border:1.5px solid var(--border); color:var(--sub); font-size:13px;}
  .cat-chips button.active{border-color:#4c6ef5; color:#4c6ef5; background:#eef1ff;}

  .flash-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px;}
  .flash-card{
    border:1.5px solid var(--border); border-radius:12px; padding:18px 16px; cursor:pointer; background:#fff;
    min-height:88px; display:flex; flex-direction:column; justify-content:center; transition:.15s;
  }
  .flash-card:hover{border-color:#4c6ef5;}
  .flash-card .front{font-weight:800; font-size:16px; white-space:pre-wrap;}
  .flash-card .back{font-size:13px; color:var(--sub); margin-top:8px; display:none;}
  .flash-card.flipped{background:#f2f4ff; border-color:#4c6ef5;}
  .flash-card.flipped .back{display:block;}
  .flash-card .hint{font-size:11px; color:#adb5bd; margin-top:6px;}

  .formula-card{border:1.5px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:12px; background:#fff;}
  .formula-card h4{margin:0 0 8px; font-size:15px; color:var(--math);}
  .formula-card p{margin:4px 0; font-size:14px;}
  .formula-card .ex{font-size:13px; color:var(--sub); margin-top:6px;}

  .study-cta{
    display:block; width:100%; padding:16px; font-size:16px; margin-top:24px; color:#fff;
    box-shadow:0 6px 16px rgba(0,0,0,.15);
  }
  .study-cta[data-s=kor]{background:linear-gradient(135deg,#4c6ef5,#3b5bdb);}
  .study-cta[data-s=eng]{background:linear-gradient(135deg,#12b886,#099268);}
  .study-cta[data-s=math]{background:linear-gradient(135deg,#f76707,#e8590c);}

  /* 이어하기 배너 */
  .resume-banner{
    border:2px solid #7048e8; background:#f2ecff; border-radius:12px; padding:16px; margin-bottom:16px;
  }
  .resume-banner .title{font-weight:800; margin-bottom:4px; color:#5f3dc4;}
  .resume-banner .desc{font-size:13px; color:var(--sub); margin-bottom:12px;}
  .resume-banner .btns{display:flex; gap:8px;}
  .resume-banner .btns button{flex:1; padding:10px; font-size:14px;}
  .resume-banner .btn-resume{background:#7048e8; color:#fff;}
  .resume-banner .btn-fresh{background:#fff; color:var(--sub); border:1.5px solid var(--border);}
  .last-score-banner{
    border:1.5px solid var(--border); background:#f8f9fb; border-radius:12px; padding:14px 16px; margin-bottom:16px; font-size:13px; color:var(--sub);
  }
  .last-score-banner b{color:var(--text);}
  .cloud-status{
    text-align:center; font-size:12px; color:var(--sub); background:#fff3cd; border:1px solid #ffe08a;
    border-radius:8px; padding:8px 12px; margin:0 16px 8px; max-width:820px; margin-left:auto; margin-right:auto;
  }

  /* 교사 화면 */
  #teacherTable{width:100%; border-collapse:collapse; font-size:13px;}
  #teacherTable th{text-align:left; padding:10px 8px; border-bottom:2px solid var(--border); color:var(--sub); font-size:12px; white-space:nowrap;}
  #teacherTable td{padding:10px 8px; border-bottom:1px solid var(--border); white-space:nowrap;}
  #teacherTable tr:hover{background:#f8f9fb;}

  .hidden{display:none !important;}
  footer{text-align:center; color:var(--sub); font-size:12px; margin-top:30px;}
</style>
</head>
<body>
<div id="modeNav">
  <button id="navStudy">📖 학습하기</button>
  <button id="navTest" class="active">📝 테스트하기</button>
  <button id="navTeacher">🧑‍🏫 교사 확인</button>
</div>
<div id="cloudStatus" class="cloud-status hidden"></div>
<div class="wrap">
  <header class="top">
    <h1>📚 기초학력 마스터</h1>
    <p>중학교 · 고1 수준 국어 · 영어 · 수학 학습 · 진단 도구</p>
  </header>

  <!-- ============ 학습 화면 ============ -->
  <section id="screenStudy" class="hidden">
    <div class="card">
      <div class="field">
        <label>학습 수준 선택</label>
        <div class="level-grid" id="studyLevelBoxes">
          <div class="level-box on" data-l="ms">중학교</div>
          <div class="level-box" data-l="hs1">고1</div>
          <div class="level-box" data-l="all">전체</div>
        </div>
      </div>
      <div class="study-tabs" id="studySubjectTabs">
        <button class="active" data-s="kor">국어</button>
        <button data-s="eng">영어</button>
        <button data-s="math">수학</button>
      </div>
      <div class="cat-chips" id="studyCatChips"></div>
      <div id="studyBody"></div>
      <button class="study-cta" id="studyCtaBtn" data-s="kor">이 과목으로 테스트 시작하기 →</button>
    </div>
  </section>

  <!-- ============ 테스트 화면 ============ -->
  <section id="screenTest">
    <!-- 시작 화면 -->
    <section id="screenStart" class="card">
      <div class="field">
        <label for="studentName">이름</label>
        <input type="text" id="studentName" placeholder="이름을 입력하세요">
      </div>
      <div class="field">
        <label for="studentClass">반 / 번호</label>
        <input type="text" id="studentClass" placeholder="예: 3반 12번">
      </div>
      <div id="resumeBanner" class="resume-banner hidden">
        <div class="title">📌 이어서 풀던 문제가 있어요</div>
        <div class="desc" id="resumeDesc"></div>
        <div class="btns">
          <button class="btn-resume" id="resumeBtn">이어서 하기</button>
          <button class="btn-fresh" id="freshStartBtn">새로 시작하기</button>
        </div>
      </div>
      <div id="lastScoreBanner" class="last-score-banner hidden"></div>
      <div class="field">
        <label>난이도 수준 선택</label>
        <div class="level-grid" id="testLevelBoxes">
          <div class="level-box on" data-l="ms">중학교</div>
          <div class="level-box" data-l="hs1">고1</div>
          <div class="level-box" data-l="all">전체</div>
        </div>
      </div>
      <div class="field">
        <label>응시할 과목 선택 (복수 선택 가능) · 과목당 20문항이 매번 랜덤 출제됩니다</label>
        <div class="subject-grid">
          <div class="subject-box on" data-s="kor" id="box-kor">국어<span class="cnt" id="cnt-kor"></span></div>
          <div class="subject-box on" data-s="eng" id="box-eng">영어<span class="cnt" id="cnt-eng"></span></div>
          <div class="subject-box on" data-s="math" id="box-math">수학<span class="cnt" id="cnt-math"></span></div>
        </div>
      </div>
      <button class="btn-main" id="startBtn">학습 시작하기</button>
    </section>

    <!-- 퀴즈 화면 -->
    <section id="screenQuiz" class="hidden">
      <div id="progressBar">
        <div class="bar"><div class="fill" id="progressFill"></div></div>
        <div class="label" id="progressLabel">0 / 0 문항 답변</div>
      </div>
      <div id="quizBody"></div>
      <button class="btn-main" id="submitBtn">채점하기</button>
    </section>

    <!-- 결과 화면 -->
    <section id="screenResult" class="hidden">
      <div id="resultCapture">
        <div class="result-head">
          <h2 id="resultName"></h2>
          <div class="meta" id="resultMeta"></div>
        </div>
        <div class="score-grid" id="scoreGrid"></div>
        <div id="reviewList"></div>
      </div>
      <div class="result-actions">
        <button class="btn-save" id="saveImgBtn">🖼️ 채점 결과 이미지로 저장</button>
        <button class="btn-retry" id="retryBtn">🔁 다른 문제로 다시 풀기</button>
      </div>
    </section>
  </section>

  <!-- ============ 교사 확인 화면 ============ -->
  <section id="screenTeacher" class="hidden">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px;">
        <div style="font-weight:800; font-size:18px;">🧑‍🏫 학생 진행 현황</div>
        <button class="btn-ghost" id="teacherRefreshBtn">🔄 새로고침</button>
      </div>
      <div id="teacherStatus" style="color:var(--sub); font-size:13px; margin-bottom:12px;"></div>
      <div style="overflow-x:auto;">
        <table id="teacherTable">
          <thead><tr>
            <th>이름</th><th>반/번호</th><th>수준</th><th>현재 상태</th><th>최근 완료 점수</th><th>마지막 활동</th>
          </tr></thead>
          <tbody id="teacherTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <footer>© 기초학력 마스터 · 학습용 자료입니다.</footer>
</div>

<script>
/* ===================== 유틸 ===================== */
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a; }
function lcm(a,b){ return Math.abs(a*b)/gcd(a,b); }
function factorial(n){ let r=1; for(let i=2;i<=n;i++) r*=i; return r; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pick(arr,n){ return shuffle(arr).slice(0,n); }
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function mcItem(q, choices, answerIndex){ return {type:'mc', q, choices, answer:answerIndex}; }
function shortItem(q, answers){ return {type:'short', q, answers}; }
/* 보기 순서를 섞으면서 정답 인덱스를 함께 갱신 */
function shuffleChoices(q, choices, correctValue){
  const order = shuffle(choices.map((c,i)=>i));
  const newChoices = order.map(i=>choices[i]);
  const newAnswer = order.indexOf(choices.indexOf(correctValue));
  return mcItem(q, newChoices, newAnswer);
}
function tagLevel(arr, level){ arr.forEach(x=>x.level=level); return arr; }
/* 지문형 문해력 문제: passages = [{passage, questions:[{q,choices,answer}]}] */
function readingItems(passages){
  const items = [];
  passages.forEach(p=>{
    p.questions.forEach(q=>{
      items.push(mcItem(`${p.passage}\n\n[문해력] ${q.q}`, q.choices, q.answer));
    });
  });
  return items;
}
function readingPairs(passages){
  const pairs = [];
  passages.forEach(p=>{
    p.questions.forEach(q=>{
      pairs.push([`${p.passage}\n\n▶ ${q.q}`, `정답: ${q.choices[q.answer]}`]);
    });
  });
  return pairs;
}
/* 일차식 ax+b 를 보기 좋은 문자열로 */
function polyStr(a,b){
  let s;
  if(a===1) s='x'; else if(a===-1) s='-x'; else s=a+'x';
  if(b>0) s += '+'+b; else if(b<0) s += String(b);
  return s;
}

const SUBJECT_NAME = {kor:"국어", eng:"영어", math:"수학"};
const LEVEL_NAME = {ms:"중학교", hs1:"고1", all:"전체"};

/* ===================== 클라우드 저장 (Firebase) =====================
   진행 상황 저장·이어하기·교사 확인 기능을 쓰려면 아래 FIREBASE_CONFIG를
   본인의 Firebase 프로젝트 설정 값으로 바꿔야 합니다. (README 참고) */
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
let firebaseReady = false;
let db = null;
try{
  if(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY" && typeof firebase !== 'undefined'){
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    firebaseReady = true;
  }
}catch(e){ console.warn('Firebase 초기화 실패:', e); firebaseReady = false; }

(function showCloudStatus(){
  const el = document.getElementById('cloudStatus');
  if(!firebaseReady){
    el.textContent = '⚠️ 진행 저장·이어하기·교사 확인 기능이 아직 설정되지 않았습니다 (관리자: FIREBASE_CONFIG 설정 필요). 문제 풀이 자체는 정상 이용 가능합니다.';
    el.classList.remove('hidden');
  }
})();

function computeStudentDocId(){
  const name = (document.getElementById('studentName').value || '').trim();
  const cls = (document.getElementById('studentClass').value || '').trim();
  if(!name || !cls) return null;
  return (cls+'_'+name).replace(/[\/\.#\$\[\]\s]+/g,'_').slice(0,150);
}

let autosaveTimer = null;
function scheduleAutosave(){
  if(!firebaseReady) return;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(()=>saveProgress('in_progress'), 1200);
}

function currentQuizItemsForSave(){
  return activeQuestions.map(({subject,index,data})=>({
    subject, index,
    type: data.type, q: data.q,
    choices: data.choices || null,
    answer: (data.answer===undefined ? null : data.answer),
    answers: data.answers || null,
    userAnswer: (userAnswers[subject+'-'+index] !== undefined ? userAnswers[subject+'-'+index] : null)
  }));
}

function saveProgress(status, extra){
  if(!firebaseReady) return;
  const id = computeStudentDocId();
  if(!id) return;
  const name = document.getElementById('studentName').value.trim();
  const classNum = document.getElementById('studentClass').value.trim();
  const payload = {
    name, classNum,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    current: {
      status, level: selectedLevel, subjects: Array.from(selectedSubjects),
      items: currentQuizItemsForSave()
    }
  };
  if(extra) Object.assign(payload, extra);
  db.collection('progress').doc(id).set(payload, {merge:true}).catch(e=>console.warn('저장 실패:', e));
}

function saveCompletion(perSubject){
  if(!firebaseReady) return;
  const id = computeStudentDocId();
  if(!id) return;
  let totalC=0, totalT=0;
  const scores = {};
  ['kor','eng','math'].forEach(s=>{
    if(perSubject[s].total>0){
      scores[s] = {c:perSubject[s].correct, t:perSubject[s].total};
      totalC += perSubject[s].correct; totalT += perSubject[s].total;
    }
  });
  const summary = {at: Date.now(), level: selectedLevel, scores, total:{c:totalC,t:totalT}};
  saveProgress('completed', {history: firebase.firestore.FieldValue.arrayUnion(summary)});
}

let lastLoadedDoc = null;
let resumeCheckTimer = null;
function scheduleResumeCheck(){
  if(!firebaseReady) return;
  clearTimeout(resumeCheckTimer);
  resumeCheckTimer = setTimeout(checkForSavedProgress, 600);
}
async function checkForSavedProgress(){
  const id = computeStudentDocId();
  const banner = document.getElementById('resumeBanner');
  const scoreBanner = document.getElementById('lastScoreBanner');
  if(!id || !firebaseReady){ banner.classList.add('hidden'); scoreBanner.classList.add('hidden'); return; }
  try{
    const doc = await db.collection('progress').doc(id).get();
    if(!doc.exists){ banner.classList.add('hidden'); scoreBanner.classList.add('hidden'); lastLoadedDoc=null; return; }
    const data = doc.data();
    lastLoadedDoc = data;
    const cur = data.current;
    if(cur && cur.status==='in_progress' && cur.items && cur.items.length){
      const answered = cur.items.filter(it=>it.userAnswer!==null && it.userAnswer!==undefined && it.userAnswer!=='').length;
      document.getElementById('resumeDesc').textContent = `${LEVEL_NAME[cur.level]} 수준 · ${cur.items.length}문항 중 ${answered}문항 답변함`;
      banner.classList.remove('hidden');
      scoreBanner.classList.add('hidden');
    } else {
      banner.classList.add('hidden');
      const hist = data.history || [];
      if(hist.length){
        const last = hist[hist.length-1];
        const d = new Date(last.at);
        const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
        const parts = ['kor','eng','math'].filter(s=>last.scores[s]).map(s=>`${SUBJECT_NAME[s]} ${last.scores[s].c}/${last.scores[s].t}`);
        scoreBanner.innerHTML = `최근 완료 기록 (${dateStr}, ${LEVEL_NAME[last.level]}): <b>${parts.join(' · ')}</b> · 총점 <b>${last.total.c}/${last.total.t}</b>`;
        scoreBanner.classList.remove('hidden');
      } else {
        scoreBanner.classList.add('hidden');
      }
    }
  }catch(e){ console.warn('불러오기 실패:', e); }
}

(function restoreLastStudentInfo(){
  try{
    const saved = JSON.parse(localStorage.getItem('gicho_student_info')||'null');
    if(saved){
      if(saved.name) document.getElementById('studentName').value = saved.name;
      if(saved.classNum) document.getElementById('studentClass').value = saved.classNum;
    }
  }catch(e){}
})();
function persistStudentInfoLocally(){
  try{
    localStorage.setItem('gicho_student_info', JSON.stringify({
      name: document.getElementById('studentName').value.trim(),
      classNum: document.getElementById('studentClass').value.trim()
    }));
  }catch(e){}
}
['studentName','studentClass'].forEach(id=>{
  document.getElementById(id).addEventListener('input', ()=>{
    persistStudentInfoLocally();
    scheduleResumeCheck();
  });
});
if(document.getElementById('studentName').value && document.getElementById('studentClass').value) scheduleResumeCheck();

function buildKorPool(){
  const pool = [];
  pool.push(...readingItems(KOR_PASSAGES));
  KOR_ANTONYMS.forEach(([a,b])=>{
    pool.push(shortItem(`"${a}"의 반의어(반대말)를 쓰시오.`, [b]));
    pool.push(shortItem(`"${b}"의 반의어(반대말)를 쓰시오.`, [a]));
  });
  KOR_SYNONYMS.forEach(([a,b])=>{
    pool.push(shortItem(`"${a}"와(과) 뜻이 비슷한 낱말을 쓰시오.`, [b]));
    pool.push(shortItem(`"${b}"와(과) 뜻이 비슷한 낱말을 쓰시오.`, [a]));
  });
  const posDistractors = ["부사","명사","동사","형용사"];
  KOR_POS.forEach(([word,correct])=>{
    const others = posDistractors.filter(p=>p!==correct);
    const choices = shuffle([correct, ...pick(others,3)]);
    pool.push(mcItem(`다음 낱말 "${word}"의 품사로 알맞은 것은?`, choices, choices.indexOf(correct)));
  });
  KOR_HONORIFIC.forEach(([word,honor])=>{
    pool.push(shortItem(`"${word}"의 높임말을 쓰시오.`, [honor]));
  });
  const allIdiomMeanings = KOR_IDIOMS.map(x=>x[1]);
  KOR_IDIOMS.forEach(([idiom,meaning])=>{
    const distractors = pick(allIdiomMeanings.filter(m=>m!==meaning), 3);
    const choices = shuffle([meaning, ...distractors]);
    pool.push(mcItem(`사자성어 "${idiom}"의 뜻으로 알맞은 것은?`, choices, choices.indexOf(meaning)));
  });
  const allWrongSpellings = KOR_SPELLING.map(x=>x[1]);
  KOR_SPELLING.forEach(([correct,wrong])=>{
    const otherWrongs = pick(allWrongSpellings.filter(w=>w!==wrong), 2);
    const choices = shuffle([correct, wrong, ...otherWrongs]);
    pool.push(mcItem(`다음 중 맞춤법(표준어)이 올바른 것은?`, choices, choices.indexOf(correct)));
  });
  return pool;
}

function buildKorPoolHS1(){
  const pool = [];
  pool.push(...readingItems(KOR2_PASSAGES));
  KOR2_SENT.forEach(([sentence,word,correct])=>{
    const others = KOR2_COMPONENT_CHOICES.filter(c=>c!==correct);
    const choices = shuffle([correct, ...pick(others,3)]);
    pool.push(mcItem(`다음 문장에서 "${word}"의 문장 성분으로 알맞은 것은? — "${sentence}"`, choices, choices.indexOf(correct)));
  });
  KOR2_HONOR_TYPE.forEach(([sentence,correct])=>{
    const choices = shuffle(KOR2_HONOR_CHOICES.slice());
    pool.push(mcItem(`다음 문장에 나타난 높임법의 종류는? — "${sentence}"`, choices, choices.indexOf(correct)));
  });
  KOR2_PIDONG_SADONG.forEach(([sentence,correct])=>{
    const choices = shuffle(["피동","사동"]);
    pool.push(mcItem(`다음 문장은 피동 표현인가, 사동 표현인가? — "${sentence}"`, choices, choices.indexOf(correct)));
  });
  KOR2_RHETORIC.forEach(([phrase,correct])=>{
    const others = KOR2_RHETORIC_CHOICES.filter(c=>c!==correct);
    const choices = shuffle([correct, ...pick(others,3)]);
    pool.push(mcItem(`다음 표현에 쓰인 표현법(수사법)은? — "${phrase}"`, choices, choices.indexOf(correct)));
  });
  KOR2_HANJA.forEach(([a,b])=>{
    pool.push(shortItem(`"${a}"의 반의어를 쓰시오.`, [b]));
    pool.push(shortItem(`"${b}"의 반의어를 쓰시오.`, [a]));
  });
  const allIdiom2Meanings = KOR2_IDIOMS2.map(x=>x[1]);
  KOR2_IDIOMS2.forEach(([idiom,meaning])=>{
    const distractors = pick(allIdiom2Meanings.filter(m=>m!==meaning), 3);
    const choices = shuffle([meaning, ...distractors]);
    pool.push(mcItem(`사자성어 "${idiom}"의 뜻으로 알맞은 것은?`, choices, choices.indexOf(meaning)));
  });
  return pool;
}

function buildMathPool(){
  const pool = [];
  pairsGrid(2,9,2,9).forEach(([a,b])=>{
    pool.push(shortItem(`${a} + ${b} = ?`, [String(a+b)]));
  });
  for(let a=10;a<=39;a++){
    const b = 2 + (a % 8);
    if(b<a) pool.push(shortItem(`${a} - ${b} = ?`, [String(a-b)]));
  }
  pairsGrid(2,9,2,9).forEach(([a,b])=>{
    pool.push(shortItem(`${a} × ${b} = ?`, [String(a*b)]));
  });
  pairsGrid(2,9,2,9).forEach(([b,k])=>{
    const a=b*k;
    pool.push(shortItem(`${a} ÷ ${b} = ?`, [String(k)]));
  });
  for(let a=2;a<=6;a++) for(let b=2;b<=6;b++) for(let c=2;c<=4;c++){
    pool.push(shortItem(`${a} + ${b} × ${c} = ?`, [String(a+b*c)]));
  }
  for(let a=2;a<=6;a++) for(let b=2;b<=6;b++) for(let c=2;c<=4;c++){
    pool.push(shortItem(`(${a} + ${b}) × ${c} = ?`, [String((a+b)*c)]));
  }
  const percents=[10,20,25,50,75];
  const bases=[20,40,60,80,100,120,160,200,240,300,400,500,600,800,1000,20,40,60,80,120];
  bases.forEach((base,i)=>{
    const p = percents[i%percents.length];
    if((base*p)%100===0){
      pool.push(shortItem(`${base}의 ${p}%는 얼마인가?`, [String(base*p/100)]));
    }
  });
  for(let d=4; d<=12; d++){
    for(let a=1; a<d-1; a++){
      const b = d-a-1>0 ? d-a-1 : 1;
      if(a+b<d){
        const num = a+b, g=gcd(num,d);
        const rn=num/g, rd=d/g;
        pool.push(shortItem(`${a}/${d} + ${b}/${d} = ? (기약분수로 답하시오)`, [rd===1? String(rn) : `${rn}/${rd}`]));
      }
    }
  }
  pairsGrid(2,12,2,12).forEach(([n,k])=>{
    const num=n*k, den=(n+1)*k;
    const g=gcd(num,den);
    pool.push(shortItem(`${num}/${den}을 기약분수로 나타내면?`, [`${num/g}/${den/g}`]));
  });
  for(let a=1;a<=25;a++){
    const x = 2 + (a%20);
    const b = a+x;
    pool.push(shortItem(`x + ${a} = ${b} 일 때, x의 값은?`, [String(x)]));
  }
  pairsGrid(2,9,2,9).forEach(([a,x])=>{
    const b=a*x;
    pool.push(shortItem(`${a}x = ${b} 일 때, x의 값은?`, [String(x)]));
  });
  for(let n=2;n<=15;n++) pool.push(shortItem(`${n}² (${n}의 제곱)의 값은?`, [String(n*n)]));
  for(let n=2;n<=10;n++) pool.push(shortItem(`${n}³ (${n}의 세제곱)의 값은?`, [String(n*n*n)]));
  [[12,18],[8,12],[15,20],[24,36],[9,15],[14,21],[16,24],[18,27],[10,25],[20,30],[21,28],[6,9],[12,16],[25,35],[30,45]]
    .forEach(([a,b])=>pool.push(shortItem(`${a}와 ${b}의 최대공약수는?`, [String(gcd(a,b))])));
  [[4,6],[3,5],[6,8],[4,10],[5,6],[3,4],[6,9],[8,12],[9,12],[2,7],[5,10],[4,5],[6,10],[3,8],[10,15]]
    .forEach(([a,b])=>pool.push(shortItem(`${a}와 ${b}의 최소공배수는?`, [String(lcm(a,b))])));
  for(let i=1;i<=25;i++){
    const a = -1*(1+(i%15));
    const b = 2+(i%20);
    pool.push(shortItem(`${a} + ${b} = ?`, [String(a+b)]));
  }
  for(let r=1;r<=15;r++){
    pool.push(shortItem(`반지름이 ${r}cm인 원의 둘레는? (π=3.14로 계산, 소수 둘째 자리까지 쓰시오)`, [(2*3.14*r).toFixed(2)]));
    pool.push(shortItem(`반지름이 ${r}cm인 원의 넓이는? (π=3.14로 계산, 소수 둘째 자리까지 쓰시오)`, [(3.14*r*r).toFixed(2)]));
  }
  pool.push(...MATH_CONCEPTS);
  return pool;
}

function buildMathPoolHS1(){
  const pool = [];
  // 다항식 덧셈/뺄셈
  for(let a=2;a<=9;a++) for(let c=2;c<=9;c++){
    if(a===c) continue;
    const b = ((a*c)%9)+1, d = ((a+c)%7)+1;
    pool.push(shortItem(`(${polyStr(a,b)}) + (${polyStr(c,d)})를 간단히 하시오.`, [polyStr(a+c,b+d)]));
    pool.push(shortItem(`(${polyStr(a,b)}) - (${polyStr(c,d)})를 간단히 하시오.`, [polyStr(a-c,b-d)]));
  }
  // 단항식 × 다항식 전개
  for(let k=2;k<=6;k++) for(let a=2;a<=6;a++) for(let b=1;b<=5;b++){
    pool.push(shortItem(`${k}x(${a}x+${b})를 전개하시오. (예: 6x²+3x)`, [`${k*a}x²+${k*b}x`]));
  }
  // 인수분해 x²+(a+b)x+ab
  for(let a=1;a<=9;a++) for(let b=a+1;b<=9;b++){
    pool.push(shortItem(`x² + ${a+b}x + ${a*b}를 인수분해하시오. (예: (x+1)(x+2))`, [`(x+${a})(x+${b})`]));
  }
  // 완전제곱식
  for(let a=1;a<=9;a++){
    pool.push(shortItem(`x² + ${2*a}x + ${a*a}를 인수분해하시오. (예: (x+1)²)`, [`(x+${a})²`]));
    pool.push(shortItem(`x² - ${2*a}x + ${a*a}를 인수분해하시오. (예: (x-1)²)`, [`(x-${a})²`]));
  }
  // 이차방정식 두 해의 합/곱
  for(let a=1;a<=9;a++) for(let b=a+1;b<=9;b++){
    pool.push(shortItem(`이차방정식 x² - ${a+b}x + ${a*b} = 0의 두 해의 합은?`, [String(a+b)]));
    pool.push(shortItem(`이차방정식 x² - ${a+b}x + ${a*b} = 0의 두 해의 곱은?`, [String(a*b)]));
  }
  // 이차부등식
  for(let a=1;a<=9;a++) for(let b=a+1;b<=9;b++){
    pool.push(shuffleChoices(`이차부등식 (x-${a})(x-${b}) > 0의 해는?`,
      [`x<${a} 또는 x>${b}`, `${a}<x<${b}`, `x<-${a} 또는 x>-${b}`, `x=${a} 또는 x=${b}`],
      `x<${a} 또는 x>${b}`));
    pool.push(shuffleChoices(`이차부등식 (x-${a})(x-${b}) < 0의 해는?`,
      [`${a}<x<${b}`, `x<${a} 또는 x>${b}`, `x<-${a} 또는 x>-${b}`, `x=${a} 또는 x=${b}`],
      `${a}<x<${b}`));
  }
  // 제곱근 간단히
  [[8,2,2],[12,2,3],[18,3,2],[20,2,5],[24,2,6],[27,3,3],[28,2,7],[32,4,2],[45,3,5],[48,4,3],
   [50,5,2],[63,3,7],[72,6,2],[75,5,3],[80,4,5],[98,7,2],[108,6,3],[125,5,5],[147,7,3],[162,9,2]]
    .forEach(([n,k,m])=>pool.push(shortItem(`√${n}을 근호 안이 가장 작은 자연수가 되도록 간단히 하시오. (예: 2√3)`, [`${k}√${m}`])));
  // 지수법칙 (수치 계산)
  [2,3,5].forEach(base=>{
    for(let m=2;m<=6;m++) for(let n=2;n<=4;n++){
      pool.push(shortItem(`${base}^${m} × ${base}^${n}의 값은?`, [String(Math.pow(base,m+n))]));
    }
  });
  // 절댓값 방정식 (두 해의 합)
  for(let a=1;a<=10;a++) for(let b=1;b<=10;b++){
    pool.push(shortItem(`방정식 |x-${a}|=${b}의 두 해의 합은?`, [String(2*a)]));
  }
  // 두 점 사이의 거리 (피타고라스 세트 활용)
  [[3,4,5],[6,8,10],[5,12,13],[8,15,17],[7,24,25],[9,12,15],[12,16,20],[10,24,26]].forEach(([dx,dy,dist])=>{
    pool.push(shortItem(`두 점 (0,0)과 (${dx},${dy}) 사이의 거리는?`, [String(dist)]));
  });
  // 두 점의 중점
  for(let x1=0;x1<=8;x1+=2) for(let y1=0;y1<=8;y1+=2){
    const x2=x1+4, y2=y1+6;
    pool.push(shortItem(`두 점 (${x1},${y1})과 (${x2},${y2})의 중점 좌표는? (예: (1,2))`, [`(${(x1+x2)/2},${(y1+y2)/2})`]));
  }
  // 직선의 기울기
  [[0,0,2,4],[0,0,3,6],[1,1,3,5],[2,1,5,7],[0,1,2,5],[1,2,4,8],[0,0,4,2],[0,0,6,3]].forEach(([x1,y1,x2,y2])=>{
    pool.push(shortItem(`두 점 (${x1},${y1})과 (${x2},${y2})을 지나는 직선의 기울기는?`, [String((y2-y1)/(x2-x1))]));
  });
  // 원의 방정식 (표준형, 중심 원점, 반지름 r → x²+y²=r² 의 오른쪽 값)
  for(let r=1;r<=12;r++){
    pool.push(shortItem(`중심이 원점이고 반지름이 ${r}인 원의 방정식 x²+y²=?  (오른쪽 값만 쓰시오)`, [String(r*r)]));
  }
  // 순열/조합
  for(let n=3;n<=7;n++) for(let r=1;r<=Math.min(n,4);r++){
    pool.push(shortItem(`${n}P${r} (순열)의 값은?`, [String(factorial(n)/factorial(n-r))]));
    pool.push(shortItem(`${n}C${r} (조합)의 값은?`, [String(factorial(n)/(factorial(r)*factorial(n-r)))]));
  }
  // 나머지정리 (다항식에 값 대입)
  for(let a=1;a<=6;a++) for(let b=1;b<=6;b++) for(let c of [1,2,3]){
    pool.push(shortItem(`다항식 x² + ${a}x + ${b}에 x=${c}를 대입한 값은?`, [String(c*c+a*c+b)]));
  }
  pool.push(...MATH_CONCEPTS_HS1);
  return pool;
}

async function loadTeacherData(){
  const statusEl = document.getElementById('teacherStatus');
  const tbody = document.getElementById('teacherTableBody');
  if(!firebaseReady){
    statusEl.textContent = '클라우드 저장이 설정되지 않아 학생 데이터를 불러올 수 없습니다. (관리자: FIREBASE_CONFIG 설정 필요)';
    tbody.innerHTML = '';
    return;
  }
  statusEl.textContent = '불러오는 중...';
  tbody.innerHTML = '';
  try{
    const snap = await db.collection('progress').orderBy('updatedAt','desc').limit(200).get();
    if(snap.empty){ statusEl.textContent = '아직 응시 기록이 없습니다.'; return; }
    statusEl.textContent = `총 ${snap.size}명의 기록 (최근 업데이트 순)`;
    snap.forEach(doc=>{
      const d = doc.data();
      const cur = d.current || {};
      const hist = d.history || [];
      const last = hist.length ? hist[hist.length-1] : null;
      let statusText = '기록 없음';
      if(cur.status==='in_progress'){
        const items = cur.items || [];
        const answered = items.filter(it=>it.userAnswer!==null && it.userAnswer!==undefined && it.userAnswer!=='').length;
        statusText = `진행중 (${answered}/${items.length})`;
      } else if(cur.status==='completed'){
        statusText = '응시 완료';
      }
      let scoreText = '-';
      if(last){
        const parts = ['kor','eng','math'].filter(s=>last.scores && last.scores[s]).map(s=>`${SUBJECT_NAME[s]} ${last.scores[s].c}/${last.scores[s].t}`);
        scoreText = `총 ${last.total.c}/${last.total.t}` + (parts.length? ` (${parts.join(', ')})` : '');
      }
      let updatedText = '-';
      if(d.updatedAt && d.updatedAt.toDate){
        const u = d.updatedAt.toDate();
        updatedText = `${u.getMonth()+1}/${u.getDate()} ${String(u.getHours()).padStart(2,'0')}:${String(u.getMinutes()).padStart(2,'0')}`;
      }
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${escapeHtml(d.name||'')}</td><td>${escapeHtml(d.classNum||'')}</td><td>${LEVEL_NAME[cur.level]||'-'}</td><td>${escapeHtml(statusText)}</td><td>${escapeHtml(scoreText)}</td><td>${updatedText}</td>`;
      tbody.appendChild(tr);
    });
  }catch(e){
    statusEl.textContent = '불러오기 실패: ' + e.message;
  }
}

function buildQuiz(resumeItems){
  activeQuestions = [];
  userAnswers = {};
  const body = document.getElementById('quizBody');
  body.innerHTML = '';

  let subjectGroups = {};
  if(resumeItems && resumeItems.length){
    resumeItems.forEach(it=>{
      subjectGroups[it.subject] = subjectGroups[it.subject] || [];
      subjectGroups[it.subject].push(it);
    });
  } else {
    const order = ['kor','eng','math'].filter(s=>selectedSubjects.has(s));
    order.forEach(subject=>{
      const src = poolByLevel(subject, selectedLevel);
      const drawn = pick(src, Math.min(QUESTIONS_PER_SUBJECT, src.length));
      subjectGroups[subject] = drawn.map(data=>({subject, type:data.type, q:data.q, choices:data.choices||null, answer:(data.answer===undefined?null:data.answer), answers:data.answers||null, userAnswer:null}));
    });
  }

  const order = ['kor','eng','math'].filter(s=>subjectGroups[s] && subjectGroups[s].length);
  order.forEach(subject=>{
    const items = subjectGroups[subject];

    const title = document.createElement('div');
    title.className = 'section-title';
    title.dataset.s = subject;
    title.innerHTML = `<span class="dot"></span>${SUBJECT_NAME[subject]} · ${LEVEL_NAME[selectedLevel]} (${items.length}문항)`;
    body.appendChild(title);

    items.forEach((it, idx)=>{
      const q = {type: it.type, q: it.q, choices: it.choices, answer: it.answer, answers: it.answers};
      activeQuestions.push({subject, index:idx, data:q});
      const key = subject+'-'+idx;
      if(it.userAnswer !== null && it.userAnswer !== undefined && it.userAnswer !== '') userAnswers[key] = it.userAnswer;

      const card = document.createElement('div');
      card.className = 'qcard';
      const qnumHtml = `<div class="qnum">${SUBJECT_NAME[subject]} ${idx+1}번</div>`;
      let bodyHtml = `<div class="qtext">${escapeHtml(q.q)}</div>`;

      if(q.type === 'mc'){
        bodyHtml += `<div class="choices">` + q.choices.map((c,ci)=>`
          <label class="choice" data-key="${key}" data-ci="${ci}">
            <input type="radio" name="${key}" value="${ci}">
            <span>${escapeHtml(c)}</span>
          </label>`).join('') + `</div>`;
      } else {
        bodyHtml += `<input type="text" class="short-input" data-key="${key}" placeholder="답을 입력하세요">`;
      }
      card.innerHTML = qnumHtml + bodyHtml;
      body.appendChild(card);
    });
  });

  // 이벤트 바인딩
  body.querySelectorAll('.choice').forEach(label=>{
    label.addEventListener('click', ()=>{
      const key = label.dataset.key;
      const ci = parseInt(label.dataset.ci, 10);
      userAnswers[key] = ci;
      document.querySelectorAll(`.choice[data-key="${key}"]`).forEach(l=>l.classList.remove('checked'));
      label.classList.add('checked');
      label.querySelector('input').checked = true;
      updateProgress();
      scheduleAutosave();
    });
  });
  body.querySelectorAll('.short-input').forEach(input=>{
    input.addEventListener('input', ()=>{
      userAnswers[input.dataset.key] = input.value;
      updateProgress();
      scheduleAutosave();
    });
  });

  restoreAnswersUI();
  updateProgress();
}

function restoreAnswersUI(){
  activeQuestions.forEach(({subject,index,data})=>{
    const key = subject+'-'+index;
    const v = userAnswers[key];
    if(v===undefined || v===null || v==='') return;
    if(data.type==='mc'){
      const label = document.querySelector(`.choice[data-key="${key}"][data-ci="${v}"]`);
      if(label){ label.classList.add('checked'); const inp=label.querySelector('input'); if(inp) inp.checked=true; }
    } else {
      const input = document.querySelector(`.short-input[data-key="${key}"]`);
      if(input) input.value = v;
    }
  });
}

function updateProgress(){
  const total = activeQuestions.length;
  let answered = 0;
  activeQuestions.forEach(({subject,index,data})=>{
    const key = subject+'-'+index;
    const v = userAnswers[key];
    if(data.type==='mc' && typeof v === 'number') answered++;
    if(data.type==='short' && typeof v === 'string' && v.trim() !== '') answered++;
  });
  const pct = total ? Math.round(answered/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${answered} / ${total} 문항 답변`;
}

/* ===================== 채점 ===================== */
function normalize(str, subject){
  let s = String(str||'').trim();
  s = s.replace(/\s+/g,'');
  if(subject === 'eng') s = s.toLowerCase();
  return s;
}

document.getElementById('submitBtn').addEventListener('click', ()=>{
  const unanswered = activeQuestions.filter(({subject,index,data})=>{
    const v = userAnswers[subject+'-'+index];
    if(data.type==='mc') return typeof v !== 'number';
    return !(typeof v === 'string' && v.trim()!=='');
  });
  if(unanswered.length > 0){
    if(!confirm(`아직 답하지 않은 문항이 ${unanswered.length}개 있습니다. 그래도 채점할까요?`)) return;
  }
  gradeAndShowResult();
});

function gradeAndShowResult(){
  const perSubject = {};
  ['kor','eng','math'].forEach(s=>{ perSubject[s] = {correct:0, total:0}; });

  const reviewRows = [];

  activeQuestions.forEach(({subject,index,data})=>{
    const key = subject+'-'+index;
    const v = userAnswers[key];
    let isCorrect = false;
    let userDisplay = '', correctDisplay = '';

    if(data.type === 'mc'){
      correctDisplay = data.choices[data.answer];
      userDisplay = (typeof v === 'number') ? data.choices[v] : '(미응답)';
      isCorrect = (v === data.answer);
    } else {
      correctDisplay = data.answers[0];
      userDisplay = (typeof v === 'string' && v.trim()!=='') ? v.trim() : '(미응답)';
      const norm = normalize(v, subject);
      isCorrect = data.answers.some(a => normalize(a, subject) === norm) && norm !== '';
    }

    perSubject[subject].total++;
    if(isCorrect) perSubject[subject].correct++;

    reviewRows.push({subject, index, q:data.q, isCorrect, userDisplay, correctDisplay});
  });

  // 이름/날짜
  const name = document.getElementById('studentName').value.trim();
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  document.getElementById('resultName').textContent = `${name} 학생의 채점 결과`;
  document.getElementById('resultMeta').textContent = `응시일: ${dateStr} · 수준: ${LEVEL_NAME[selectedLevel]}`;

  // 점수 카드
  const scoreGrid = document.getElementById('scoreGrid');
  scoreGrid.innerHTML = '';
  let totalCorrect = 0, totalCount = 0;
  ['kor','eng','math'].forEach(s=>{
    const {correct,total} = perSubject[s];
    if(total === 0) return;
    totalCorrect += correct; totalCount += total;
    const box = document.createElement('div');
    box.className = 'score-box ' + s;
    box.innerHTML = `<div class="name">${SUBJECT_NAME[s]}</div><div class="val">${correct}/${total}</div><div class="sub">${Math.round(correct/total*100)}점</div>`;
    scoreGrid.appendChild(box);
  });
  const totalBox = document.createElement('div');
  totalBox.className = 'score-box total';
  totalBox.innerHTML = `<div class="name">총점</div><div class="val">${totalCorrect}/${totalCount}</div><div class="sub">${totalCount? Math.round(totalCorrect/totalCount*100):0}점</div>`;
  scoreGrid.appendChild(totalBox);

  // 리뷰 리스트
  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  let curSubject = null;
  reviewRows.forEach(row=>{
    if(row.subject !== curSubject){
      curSubject = row.subject;
      const t = document.createElement('div');
      t.className = 'section-title';
      t.dataset.s = curSubject;
      t.innerHTML = `<span class="dot"></span>${SUBJECT_NAME[curSubject]} 채점 내역`;
      reviewList.appendChild(t);
    }
    const item = document.createElement('div');
    item.className = 'review-item ' + (row.isCorrect ? 'ok' : 'bad');
    item.innerHTML = `
      <div class="mark">${row.isCorrect ? 'O' : 'X'}</div>
      <div class="qt">
        <div>${row.index+1}. ${escapeHtml(row.q)}</div>
        <div class="ans">내 답: <b class="${row.isCorrect?'correct':''}">${escapeHtml(row.userDisplay)}</b>${row.isCorrect?'':` / 정답: <b class="correct">${escapeHtml(row.correctDisplay)}</b>`}</div>
      </div>`;
    reviewList.appendChild(item);
  });

  saveCompletion(perSubject);
  show('screenResult');
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('saveImgBtn').addEventListener('click', async ()=>{
  const target = document.getElementById('resultCapture');
  const btn = document.getElementById('saveImgBtn');
  btn.disabled = true;
  btn.textContent = '이미지 생성 중...';
  try{
    const canvas = await html2canvas(target, {scale:2, backgroundColor:'#ffffff'});
    const link = document.createElement('a');
    const name = document.getElementById('studentName').value.trim() || '학생';
    link.download = `기초학력_채점결과_${name}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e){
    alert('이미지 저장 중 오류가 발생했습니다: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🖼️ 채점 결과 이미지로 저장';
  }
});

/* ===================== 다시 풀기 ===================== */
document.getElementById('retryBtn').addEventListener('click', ()=>{
  if(!confirm('새로운 문제로 다시 시작할까요? 현재 답안은 초기화됩니다.')) return;
  show('screenStart');
  window.scrollTo({top:0});
});

/* ===================== 유틸: 화면 전환 ===================== */
function show(id){
  ['screenStart','screenQuiz','screenResult'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}
</script>
