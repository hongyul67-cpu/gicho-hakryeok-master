<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기초학력 마스터 - 국영수 학습·진단</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --kor:#4c6ef5; --eng:#12b886; --math:#f76707;
    --bg:#f4f6fb; --card:#ffffff; --text:#22262e; --sub:#6b7280;
    --ok:#2f9e44; --bad:#e03131; --border:#e3e6ec;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5;
  }
  .wrap{max-width:820px; margin:0 auto; padding:0 16px 80px;}
  header.top{
    text-align:center; padding:28px 16px 16px;
  }
  header.top h1{margin:0 0 6px; font-size:28px;}
  header.top p{margin:0; color:var(--sub); font-size:14px;}

  /* 최상단 모드 네비게이션 */
  #modeNav{
    position:sticky; top:0; z-index:10; background:var(--bg); padding:10px 0 14px;
    display:flex; gap:8px; max-width:820px; margin:0 auto; padding-left:16px; padding-right:16px;
  }
  #modeNav button{
    flex:1; padding:14px; border-radius:12px; font-size:15px; background:#e9ecf3; color:var(--sub);
    border:2px solid transparent;
  }
  #modeNav button.active{background:#fff; color:var(--text); border-color:#4c6ef5; box-shadow:0 2px 8px rgba(76,110,245,.18);}

  .card{background:var(--card); border-radius:16px; padding:24px; box-shadow:0 2px 12px rgba(0,0,0,.06); margin-bottom:20px;}

  /* 시작 화면 */
  .field{margin-bottom:16px;}
  .field label{display:block; font-weight:700; margin-bottom:6px; font-size:14px;}
  .field input[type=text]{
    width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:10px; font-size:16px;
  }
  .subject-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px;}
  .subject-box{
    border:2px solid var(--border); border-radius:12px; padding:16px; text-align:center; cursor:pointer;
    transition:.15s; user-select:none; font-weight:700;
  }
  .subject-box.on{border-color:var(--kor); background:#edf1ff; box-shadow:0 0 0 2px var(--kor) inset;}
  .subject-box[data-s=eng].on{border-color:var(--eng); background:#e6fbf3; box-shadow:0 0 0 2px var(--eng) inset;}
  .subject-box[data-s=math].on{border-color:var(--math); background:#fff2e8; box-shadow:0 0 0 2px var(--math) inset;}
  .subject-box .cnt{display:block; font-weight:400; font-size:12px; color:var(--sub); margin-top:4px;}

  button{
    font-family:inherit; cursor:pointer; border:none; border-radius:10px; font-weight:700;
  }
  .btn-main{
    display:block; width:100%; padding:16px; font-size:17px; background:linear-gradient(135deg,#4c6ef5,#4263eb);
    color:#fff; margin-top:20px; box-shadow:0 6px 16px rgba(76,110,245,.35);
  }
  .btn-main:disabled{background:#c9ccd4; box-shadow:none; cursor:not-allowed;}
  .btn-ghost{
    padding:12px 18px; background:#eef0f4; color:var(--text); font-size:14px;
  }

  /* 퀴즈 화면 */
  .section-title{
    display:flex; align-items:center; gap:10px; margin:28px 0 14px; font-size:19px; font-weight:800;
  }
  .section-title .dot{width:12px; height:12px; border-radius:50%;}
  .section-title[data-s=kor] .dot{background:var(--kor);}
  .section-title[data-s=eng] .dot{background:var(--eng);}
  .section-title[data-s=math] .dot{background:var(--math);}

  .qcard{border:1px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:12px; background:#fff;}
  .qcard .qnum{font-size:12px; color:var(--sub); font-weight:700; margin-bottom:4px;}
  .qcard .qtext{font-size:16px; font-weight:700; margin-bottom:12px;}
  .choices{display:flex; flex-direction:column; gap:8px;}
  .choice{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border:1.5px solid var(--border);
    border-radius:8px; cursor:pointer; font-size:14px;
  }
  .choice input{accent-color:#4c6ef5;}
  .choice.checked{border-color:#4c6ef5; background:#f2f4ff;}
  .short-input{
    width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:15px;
  }

  #progressBar{position:sticky; top:56px; z-index:5; background:var(--bg); padding:10px 0;}
  #progressBar .bar{height:8px; background:#e3e6ec; border-radius:6px; overflow:hidden;}
  #progressBar .fill{height:100%; background:linear-gradient(90deg,#4c6ef5,#12b886,#f76707); width:0%; transition:.2s;}
  #progressBar .label{font-size:12px; color:var(--sub); margin-top:4px; text-align:right;}

  /* 결과 화면 */
  #resultCapture{background:#fff; border-radius:16px; padding:28px; }
  .result-head{text-align:center; margin-bottom:20px;}
  .result-head h2{margin:0 0 4px; font-size:22px;}
  .result-head .meta{color:var(--sub); font-size:13px;}
  .score-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; margin-bottom:20px;}
  .score-box{border-radius:12px; padding:16px; text-align:center; color:#fff;}
  .score-box.kor{background:linear-gradient(135deg,#4c6ef5,#3b5bdb);}
  .score-box.eng{background:linear-gradient(135deg,#12b886,#099268);}
  .score-box.math{background:linear-gradient(135deg,#f76707,#e8590c);}
  .score-box.total{background:linear-gradient(135deg,#495057,#212529);}
  .score-box .name{font-size:13px; opacity:.9; margin-bottom:4px;}
  .score-box .val{font-size:26px; font-weight:800;}
  .score-box .sub{font-size:11px; opacity:.85;}

  .review-item{
    display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px;
  }
  .review-item:last-child{border-bottom:none;}
  .review-item .mark{width:22px; flex:0 0 22px; text-align:center; font-weight:800;}
  .review-item.ok .mark{color:var(--ok);}
  .review-item.bad .mark{color:var(--bad);}
  .review-item .qt{flex:1;}
  .review-item .ans{color:var(--sub); font-size:12px; margin-top:2px;}
  .review-item .ans b{color:var(--bad);}
  .review-item .ans b.correct{color:var(--ok);}

  .result-actions{display:flex; gap:10px; margin-top:24px; flex-wrap:wrap;}
  .result-actions button{flex:1; min-width:140px; padding:14px; font-size:15px;}
  .btn-save{background:linear-gradient(135deg,#4c6ef5,#4263eb); color:#fff;}
  .btn-retry{background:#eef0f4; color:var(--text);}

  /* 학습 화면 */
  .study-tabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .study-tabs button{padding:10px 16px; background:#eef0f4; color:var(--sub); font-size:14px;}
  .study-tabs button.active{color:#fff;}
  .study-tabs button.active[data-s=kor]{background:var(--kor);}
  .study-tabs button.active[data-s=eng]{background:var(--eng);}
  .study-tabs button.active[data-s=math]{background:var(--math);}

  .cat-chips{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
  .cat-chips button{padding:8px 14px; background:#fff; border:1.5px solid var(--border); color:var(--sub); font-size:13px;}
  .cat-chips button.active{border-color:#4c6ef5; color:#4c6ef5; background:#eef1ff;}

  .flash-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px;}
  .flash-card{
    border:1.5px solid var(--border); border-radius:12px; padding:18px 16px; cursor:pointer; background:#fff;
    min-height:88px; display:flex; flex-direction:column; justify-content:center; transition:.15s;
  }
  .flash-card:hover{border-color:#4c6ef5;}
  .flash-card .front{font-weight:800; font-size:16px;}
  .flash-card .back{font-size:13px; color:var(--sub); margin-top:8px; display:none;}
  .flash-card.flipped{background:#f2f4ff; border-color:#4c6ef5;}
  .flash-card.flipped .back{display:block;}
  .flash-card .hint{font-size:11px; color:#adb5bd; margin-top:6px;}

  .formula-card{border:1.5px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:12px; background:#fff;}
  .formula-card h4{margin:0 0 8px; font-size:15px; color:var(--math);}
  .formula-card p{margin:4px 0; font-size:14px;}
  .formula-card .ex{font-size:13px; color:var(--sub); margin-top:6px;}

  .study-cta{
    display:block; width:100%; padding:16px; font-size:16px; margin-top:24px; color:#fff;
    box-shadow:0 6px 16px rgba(0,0,0,.15);
  }
  .study-cta[data-s=kor]{background:linear-gradient(135deg,#4c6ef5,#3b5bdb);}
  .study-cta[data-s=eng]{background:linear-gradient(135deg,#12b886,#099268);}
  .study-cta[data-s=math]{background:linear-gradient(135deg,#f76707,#e8590c);}

  .hidden{display:none !important;}
  footer{text-align:center; color:var(--sub); font-size:12px; margin-top:30px;}
</style>
</head>
<body>
<div id="modeNav">
  <button id="navStudy">📖 학습하기</button>
  <button id="navTest" class="active">📝 테스트하기</button>
</div>
<div class="wrap">
  <header class="top">
    <h1>📚 기초학력 마스터</h1>
    <p>중학교 수준 국어 · 영어 · 수학 기초 학습 · 진단 도구</p>
  </header>

  <!-- ============ 학습 화면 ============ -->
  <section id="screenStudy" class="hidden">
    <div class="card">
      <div class="study-tabs" id="studySubjectTabs">
        <button class="active" data-s="kor">국어</button>
        <button data-s="eng">영어</button>
        <button data-s="math">수학</button>
      </div>
      <div class="cat-chips" id="studyCatChips"></div>
      <div id="studyBody"></div>
      <button class="study-cta" id="studyCtaBtn" data-s="kor">이 과목으로 테스트 시작하기 →</button>
    </div>
  </section>

  <!-- ============ 테스트 화면 ============ -->
  <section id="screenTest">
    <!-- 시작 화면 -->
    <section id="screenStart" class="card">
      <div class="field">
        <label for="studentName">이름</label>
        <input type="text" id="studentName" placeholder="이름을 입력하세요">
      </div>
      <div class="field">
        <label>응시할 과목 선택 (복수 선택 가능) · 과목당 20문항이 매번 랜덤 출제됩니다</label>
        <div class="subject-grid">
          <div class="subject-box on" data-s="kor" id="box-kor">국어<span class="cnt" id="cnt-kor"></span></div>
          <div class="subject-box on" data-s="eng" id="box-eng">영어<span class="cnt" id="cnt-eng"></span></div>
          <div class="subject-box on" data-s="math" id="box-math">수학<span class="cnt" id="cnt-math"></span></div>
        </div>
      </div>
      <button class="btn-main" id="startBtn">학습 시작하기</button>
    </section>

    <!-- 퀴즈 화면 -->
    <section id="screenQuiz" class="hidden">
      <div id="progressBar">
        <div class="bar"><div class="fill" id="progressFill"></div></div>
        <div class="label" id="progressLabel">0 / 0 문항 답변</div>
      </div>
      <div id="quizBody"></div>
      <button class="btn-main" id="submitBtn">채점하기</button>
    </section>

    <!-- 결과 화면 -->
    <section id="screenResult" class="hidden">
      <div id="resultCapture">
        <div class="result-head">
          <h2 id="resultName"></h2>
          <div class="meta" id="resultMeta"></div>
        </div>
        <div class="score-grid" id="scoreGrid"></div>
        <div id="reviewList"></div>
      </div>
      <div class="result-actions">
        <button class="btn-save" id="saveImgBtn">🖼️ 채점 결과 이미지로 저장</button>
        <button class="btn-retry" id="retryBtn">🔁 다른 문제로 다시 풀기</button>
      </div>
    </section>
  </section>

  <footer>© 기초학력 마스터 · 학습용 자료입니다.</footer>
</div>

<script>
/* ===================== 유틸 ===================== */
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a; }
function lcm(a,b){ return Math.abs(a*b)/gcd(a,b); }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pick(arr,n){ return shuffle(arr).slice(0,n); }
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function mcItem(q, choices, answerIndex){ return {type:'mc', q, choices, answer:answerIndex}; }
function shortItem(q, answers){ return {type:'short', q, answers}; }
/* 보기 순서를 섞으면서 정답 인덱스를 함께 갱신 */
function shuffleChoices(q, choices, correctValue){
  const order = shuffle(choices.map((c,i)=>i));
  const newChoices = order.map(i=>choices[i]);
  const newAnswer = order.indexOf(choices.indexOf(correctValue));
  return mcItem(q, newChoices, newAnswer);
}

const SUBJECT_NAME = {kor:"국어", eng:"영어", math:"수학"};

/* ===================== 국어 데이터뱅크 ===================== */
const KOR_ANTONYMS = [

  ["무겁다","가볍다"],["빠르다","느리다"],["덥다","춥다"],["뜨겁다","차갑다"],["밝다","어둡다"],
  ["기쁘다","슬프다"],["좋다","나쁘다"],["쉽다","어렵다"],["강하다","약하다"],["두껍다","얇다"],
  ["굵다","가늘다"],["깨끗하다","더럽다"],["부지런하다","게으르다"],["정직하다","거짓되다"],["친절하다","불친절하다"],
  ["안전하다","위험하다"],["편리하다","불편하다"],["다르다","같다"],["시작하다","끝나다"],["앉다","서다"],
  ["오다","가다"],["사다","팔다"],["열다","닫다"],["주다","받다"],["웃다","울다"],
  ["이기다","지다"],["살다","죽다"],["얻다","잃다"],["채우다","비우다"],["늘다","줄다"],
  ["오르다","내리다"],["켜다","끄다"],["붙다","떨어지다"],["가깝다","멀다"],["위","아래"],
  ["안","밖"],["낮","밤"]

const KOR_SYNONYMS = [
  ["가늠하다","짐작하다"],["착하다","선하다"],["예쁘다","아름답다"],["기쁘다","즐겁다"],["무섭다","두렵다"],
  ["슬기롭다","지혜롭다"],["훌륭하다","뛰어나다"],["조용하다","고요하다"],["재빠르다","민첩하다"],["커다랗다","거대하다"],
  ["아끼다","절약하다"],["소중하다","귀중하다"],["도와주다","돕다"],["이야기하다","말하다"],["살펴보다","관찰하다"],
  ["생각하다","사고하다"],["튼튼하다","건강하다"],["힘들다","고되다"],["자세하다","상세하다"],["갑자기","별안간"],
  ["언제나","항상"],["매우","몹시"],["벌써","이미"],["겨우","간신히"]

const KOR_POS = [
  ["빠르게","부사"],["학교","명사"],["먹다","동사"],["예쁘다","형용사"],["조용히","부사"],
  ["사랑","명사"],["달리다","동사"],["크다","형용사"],["천천히","부사"],["친구","명사"],

  ["좋다","형용사"],["매우","부사"],["하늘","명사"],["놀다","동사"],["춥다","형용사"],

  ["주다","드리다"],["묻다","여쭈다"],["이름","성함"],["나이","연세"],["밥","진지"],

  ["자업자득","자기가 저지른 일의 결과를 자기가 받음"],["일석이조","한 가지 일로 두 가지 이익을 얻음"],
  ["백문불여일견","백 번 듣는 것보다 한 번 보는 것이 나음"],["고진감래","고생 끝에 즐거움이 옴"],
  ["작심삼일","결심이 사흘을 가지 못함"],["새옹지마","인생의 좋고 나쁨은 예측하기 어려움"],["청출어람","제자가 스승보다 나음"],
  ["대기만성","크게 될 사람은 늦게 성공함"],["역지사지","처지를 바꾸어 생각함"],["우이독경","아무리 말해도 알아듣지 못함"],
  ["등하불명","가까이 있는 것을 도리어 알아보지 못함"],["결자해지","일을 저지른 사람이 그 일을 해결함"],
  ["타산지석","남의 하찮은 언행도 자신을 갈고닦는 데 도움이 됨"],["사필귀정","모든 일은 결국 바른길로 돌아감"],
  ["과유불급","지나침은 미치지 못함과 같음"],["십시일반","여러 사람이 조금씩 힘을 합하면 큰 도움이 됨"],
  ["각주구검","융통성 없이 옛것에만 얽매임"],["감언이설","남의 비위를 맞추는 달콤한 말"],["파죽지세","거침없이 나아가는 기세"],
  ["화룡점정","가장 중요한 부분을 마쳐 일을 완성함"],["금상첨화","좋은 일에 좋은 일이 더해짐"]

const KOR_SPELLING = [
  ["왠지","웬지"],["오랜만","오랫만"],["설거지","설겆이"],["며칠","몇일"],["어이없다","어의없다"],
  ["금세","금새"],["희한하다","희안하다"],["뒤처지다","뒤쳐지다"],["삼가다","삼가하다"],["되뇌다","되뇌이다"],
  ["통틀어","통털어"],["곱빼기","곱배기"],["깍두기","깎두기"],["널찍하다","넓직하다"],["계속","게속"],
  ["서슴지","서슴치"],["웬만하면","왠만하면"],["어떡해","어떻해"],["안성맞춤","안성마춤"],["낭떠러지","낭떨어지"]

function buildKorPool(){
  const pool = [];
  KOR_ANTONYMS.forEach(([a,b])=>{
    pool.push(shortItem(`"${a}"의 반의어(반대말)를 쓰시오.`, [b]));
    pool.push(shortItem(`"${b}"의 반의어(반대말)를 쓰시오.`, [a]));
  });
  KOR_SYNONYMS.forEach(([a,b])=>{
    pool.push(shortItem(`"${a}"와(과) 뜻이 비슷한 낱말을 쓰시오.`, [b]));
    pool.push(shortItem(`"${b}"와(과) 뜻이 비슷한 낱말을 쓰시오.`, [a]));
  });
  const posDistractors = ["부사","명사","동사","형용사"];
  KOR_POS.forEach(([word,correct])=>{
    const others = posDistractors.filter(p=>p!==correct);
    const choices = shuffle([correct, ...pick(others,3)]);
    pool.push(mcItem(`다음 낱말 "${word}"의 품사로 알맞은 것은?`, choices, choices.indexOf(correct)));
  });
  KOR_HONORIFIC.forEach(([word,honor])=>{
    pool.push(shortItem(`"${word}"의 높임말을 쓰시오.`, [honor]));
  });
  const allIdiomMeanings = KOR_IDIOMS.map(x=>x[1]);
  KOR_IDIOMS.forEach(([idiom,meaning])=>{
    const distractors = pick(allIdiomMeanings.filter(m=>m!==meaning), 3);
    const choices = shuffle([meaning, ...distractors]);
    pool.push(mcItem(`사자성어 "${idiom}"의 뜻으로 알맞은 것은?`, choices, choices.indexOf(meaning)));
  });
  const allWrongSpellings = KOR_SPELLING.map(x=>x[1]);
  KOR_SPELLING.forEach(([correct,wrong])=>{
    const otherWrongs = pick(allWrongSpellings.filter(w=>w!==wrong), 2);
    const choices = shuffle([correct, wrong, ...otherWrongs]);
    pool.push(mcItem(`다음 중 맞춤법(표준어)이 올바른 것은?`, choices, choices.indexOf(correct)));
  });
  return pool;
}

  for(let a=aMin;a<=aMax;a++) for(let b=bMin;b<=bMax;b++) arr.push([a,b]);

}

function buildMathPool(){
  const pool = [];
  // 덧셈
  pairsGrid(2,9,2,9).forEach(([a,b])=>{
    pool.push(shortItem(`${a} + ${b} = ?`, [String(a+b)]));
  });
  // 뺄셈 (a>b)
  for(let a=10;a<=39;a++){
    const b = 2 + (a % 8);
    if(b<a) pool.push(shortItem(`${a} - ${b} = ?`, [String(a-b)]));
  }
  // 곱셈 (구구단)
  pairsGrid(2,9,2,9).forEach(([a,b])=>{
    pool.push(shortItem(`${a} × ${b} = ?`, [String(a*b)]));
  });
  // 나눗셈 (나누어떨어짐)
  pairsGrid(2,9,2,9).forEach(([b,k])=>{
    const a=b*k;
    pool.push(shortItem(`${a} ÷ ${b} = ?`, [String(k)]));
  });
  // 혼합계산 (사칙연산 순서)
  for(let a=2;a<=6;a++) for(let b=2;b<=6;b++) for(let c=2;c<=4;c++){
    pool.push(shortItem(`${a} + ${b} × ${c} = ?`, [String(a+b*c)]));
  }
  // 괄호 혼합계산
  for(let a=2;a<=6;a++) for(let b=2;b<=6;b++) for(let c=2;c<=4;c++){
    pool.push(shortItem(`(${a} + ${b}) × ${c} = ?`, [String((a+b)*c)]));
  }
  // 퍼센트
  const percents=[10,20,25,50,75];
  const bases=[20,40,60,80,100,120,160,200,240,300,400,500,600,800,1000,20,40,60,80,120];
  bases.forEach((base,i)=>{
    const p = percents[i%percents.length];
    if((base*p)%100===0){
      pool.push(shortItem(`${base}의 ${p}%는 얼마인가?`, [String(base*p/100)]));
    }
  });
  // 분수 덧셈(같은 분모)
  for(let d=4; d<=12; d++){
    for(let a=1; a<d-1; a++){
      const b = d-a-1>0 ? d-a-1 : 1;
      if(a+b<d){
        const num = a+b, g=gcd(num,d);
        const rn=num/g, rd=d/g;
        pool.push(shortItem(`${a}/${d} + ${b}/${d} = ? (기약분수로 답하시오)`, [rd===1? String(rn) : `${rn}/${rd}`]));
      }
    }
  }
  // 기약분수 만들기
  pairsGrid(2,12,2,12).forEach(([n,k])=>{
    const num=n*k, den=(n+1)*k;
    const g=gcd(num,den);
    pool.push(shortItem(`${num}/${den}을 기약분수로 나타내면?`, [`${num/g}/${den/g}`]));
  });
  // 일차방정식 x + a = b
  for(let a=1;a<=25;a++){
    const x = 2 + (a%20);
    const b = a+x;
    pool.push(shortItem(`x + ${a} = ${b} 일 때, x의 값은?`, [String(x)]));
  }
  // 일차방정식 a * x = b
  pairsGrid(2,9,2,9).forEach(([a,x])=>{
    const b=a*x;
    pool.push(shortItem(`${a}x = ${b} 일 때, x의 값은?`, [String(x)]));
  });
  // 제곱, 세제곱
  for(let n=2;n<=15;n++) pool.push(shortItem(`${n}² (${n}의 제곱)의 값은?`, [String(n*n)]));
  for(let n=2;n<=10;n++) pool.push(shortItem(`${n}³ (${n}의 세제곱)의 값은?`, [String(n*n*n)]));
  // 최대공약수
  [[12,18],[8,12],[15,20],[24,36],[9,15],[14,21],[16,24],[18,27],[10,25],[20,30],[21,28],[6,9],[12,16],[25,35],[30,45]]
    .forEach(([a,b])=>pool.push(shortItem(`${a}와 ${b}의 최대공약수는?`, [String(gcd(a,b))])));
  // 최소공배수
  [[4,6],[3,5],[6,8],[4,10],[5,6],[3,4],[6,9],[8,12],[9,12],[2,7],[5,10],[4,5],[6,10],[3,8],[10,15]]
    .forEach(([a,b])=>pool.push(shortItem(`${a}와 ${b}의 최소공배수는?`, [String(lcm(a,b))])));
  // 음수 덧셈/뺄셈
  for(let i=1;i<=25;i++){
    const a = -1*(1+(i%15));
    const b = 2+(i%20);
    pool.push(shortItem(`${a} + ${b} = ?`, [String(a+b)]));
  }
  // 원의 둘레 / 넓이 (파이=3.14)
  for(let r=1;r<=15;r++){
    pool.push(shortItem(`반지름이 ${r}cm인 원의 둘레는? (π=3.14로 계산, 소수 둘째 자리까지 쓰시오)`, [(2*3.14*r).toFixed(2)]));
    pool.push(shortItem(`반지름이 ${r}cm인 원의 넓이는? (π=3.14로 계산, 소수 둘째 자리까지 쓰시오)`, [(3.14*r*r).toFixed(2)]));
  }
  pool.push(...MATH_CONCEPTS);
  return pool;
}

      renderStudyChips();
      renderStudyBody();
    });
    wrap.appendChild(b);
  });
}

function renderStudyBody(){
  const body = document.getElementById('studyBody');
  body.innerHTML = '';

  if(studySubject === 'math'){
    MATH_FORMULAS.forEach(f=>{
      const card = document.createElement('div');
      card.className = 'formula-card';
      card.innerHTML = `<h4>${escapeHtml(f.title)}</h4><p>${escapeHtml(f.body)}</p><div class="ex">${escapeHtml(f.ex)}</div>`;
      body.appendChild(card);
    });
    return;
  }

  const cat = STUDY_CATEGORIES[studySubject].find(c=>c.key===studyCategory);
  const grid = document.createElement('div');
  grid.className = 'flash-grid';
  cat.data.forEach(([front,back])=>{
    const card = document.createElement('div');
    card.className = 'flash-card';
    card.innerHTML = `<div class="front">${escapeHtml(front)}</div><div class="back">${escapeHtml(back)}</div><div class="hint">탭하여 뜻 보기</div>`;
    card.addEventListener('click', ()=> card.classList.toggle('flipped'));
    grid.appendChild(card);
  });
  body.appendChild(grid);
}

document.getElementById('studyCtaBtn').addEventListener('click', ()=>{
  document.querySelectorAll('.subject-box').forEach(box=>{
    const on = box.dataset.s === studySubject;
    box.classList.toggle('on', on);
    if(on) selectedSubjects = new Set([studySubject]);
  });
  setMode('test');
  show('screenStart');
  document.getElementById('studentName').focus();
});

studyCategory = STUDY_CATEGORIES.kor[0].key;
renderStudyChips();
renderStudyBody();

/* ===================== 테스트 상태 ===================== */
let selectedSubjects = new Set(["kor","eng","math"]);
let activeQuestions = []; // {subject, index, data}
let userAnswers = {}; // key "subject-index" -> value

/* 과목 선택 토글 */
document.querySelectorAll('#screenStart .subject-box').forEach(box=>{
  box.addEventListener('click', ()=>{
    const s = box.dataset.s;
    if(selectedSubjects.has(s)){
      if(selectedSubjects.size === 1) return; // 최소 1과목
      selectedSubjects.delete(s);
      box.classList.remove('on');
    } else {
      selectedSubjects.add(s);
      box.classList.add('on');
    }
  });
});

/* 시작 버튼 */
document.getElementById('startBtn').addEventListener('click', ()=>{
  const name = document.getElementById('studentName').value.trim();
  if(!name){ alert('이름을 입력해 주세요.'); return; }
  if(selectedSubjects.size === 0){ alert('과목을 하나 이상 선택해 주세요.'); return; }
  buildQuiz();
  show('screenQuiz');
});

function buildQuiz(){
  activeQuestions = [];
  userAnswers = {};
  const order = ['kor','eng','math'].filter(s=>selectedSubjects.has(s));
  const body = document.getElementById('quizBody');
  body.innerHTML = '';

  order.forEach(subject=>{
    const drawn = pick(POOLS[subject], Math.min(QUESTIONS_PER_SUBJECT, POOLS[subject].length));

    const title = document.createElement('div');
    title.className = 'section-title';
    title.dataset.s = subject;
    title.innerHTML = `<span class="dot"></span>${SUBJECT_NAME[subject]} (${drawn.length}문항)`;
    body.appendChild(title);

    drawn.forEach((q, idx)=>{
      activeQuestions.push({subject, index:idx, data:q});
      const key = subject+'-'+idx;
      const card = document.createElement('div');
      card.className = 'qcard';
      const qnumHtml = `<div class="qnum">${SUBJECT_NAME[subject]} ${idx+1}번</div>`;
      let bodyHtml = `<div class="qtext">${escapeHtml(q.q)}</div>`;

      if(q.type === 'mc'){
        bodyHtml += `<div class="choices">` + q.choices.map((c,ci)=>`
          <label class="choice" data-key="${key}" data-ci="${ci}">
            <input type="radio" name="${key}" value="${ci}">
            <span>${escapeHtml(c)}</span>
          </label>`).join('') + `</div>`;
      } else {
        bodyHtml += `<input type="text" class="short-input" data-key="${key}" placeholder="답을 입력하세요">`;
      }
      card.innerHTML = qnumHtml + bodyHtml;
      body.appendChild(card);
    });
  });

  // 이벤트 바인딩
  body.querySelectorAll('.choice').forEach(label=>{
    label.addEventListener('click', ()=>{
      const key = label.dataset.key;
      const ci = parseInt(label.dataset.ci, 10);
      userAnswers[key] = ci;
      document.querySelectorAll(`.choice[data-key="${key}"]`).forEach(l=>l.classList.remove('checked'));
      label.classList.add('checked');
      label.querySelector('input').checked = true;
      updateProgress();
    });
  });
  body.querySelectorAll('.short-input').forEach(input=>{
    input.addEventListener('input', ()=>{
      userAnswers[input.dataset.key] = input.value;
      updateProgress();
    });
  });

  updateProgress();
}

function updateProgress(){
  const total = activeQuestions.length;
  let answered = 0;
  activeQuestions.forEach(({subject,index,data})=>{
    const key = subject+'-'+index;
    const v = userAnswers[key];
    if(data.type==='mc' && typeof v === 'number') answered++;
    if(data.type==='short' && typeof v === 'string' && v.trim() !== '') answered++;
  });
  const pct = total ? Math.round(answered/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${answered} / ${total} 문항 답변`;
}

/* ===================== 채점 ===================== */
function normalize(str, subject){
  let s = String(str||'').trim();
  s = s.replace(/\s+/g,'');
  if(subject === 'eng') s = s.toLowerCase();
  return s;
}

document.getElementById('submitBtn').addEventListener('click', ()=>{
  const unanswered = activeQuestions.filter(({subject,index,data})=>{
    const v = userAnswers[subject+'-'+index];
    if(data.type==='mc') return typeof v !== 'number';
    return !(typeof v === 'string' && v.trim()!=='');
  });
  if(unanswered.length > 0){
    if(!confirm(`아직 답하지 않은 문항이 ${unanswered.length}개 있습니다. 그래도 채점할까요?`)) return;
  }
  gradeAndShowResult();
});

function gradeAndShowResult(){
  const perSubject = {};
  ['kor','eng','math'].forEach(s=>{ perSubject[s] = {correct:0, total:0}; });

  const reviewRows = [];

  activeQuestions.forEach(({subject,index,data})=>{
    const key = subject+'-'+index;
    const v = userAnswers[key];
    let isCorrect = false;
    let userDisplay = '', correctDisplay = '';

    if(data.type === 'mc'){
      correctDisplay = data.choices[data.answer];
      userDisplay = (typeof v === 'number') ? data.choices[v] : '(미응답)';
      isCorrect = (v === data.answer);
    } else {
      correctDisplay = data.answers[0];
      userDisplay = (typeof v === 'string' && v.trim()!=='') ? v.trim() : '(미응답)';
      const norm = normalize(v, subject);
      isCorrect = data.answers.some(a => normalize(a, subject) === norm) && norm !== '';
    }

    perSubject[subject].total++;
    if(isCorrect) perSubject[subject].correct++;

    reviewRows.push({subject, index, q:data.q, isCorrect, userDisplay, correctDisplay});
  });

  // 이름/날짜
  const name = document.getElementById('studentName').value.trim();
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  document.getElementById('resultName').textContent = `${name} 학생의 채점 결과`;
  document.getElementById('resultMeta').textContent = `응시일: ${dateStr}`;

  // 점수 카드
  const scoreGrid = document.getElementById('scoreGrid');
  scoreGrid.innerHTML = '';
  let totalCorrect = 0, totalCount = 0;
  ['kor','eng','math'].forEach(s=>{
    const {correct,total} = perSubject[s];
    if(total === 0) return;
    totalCorrect += correct; totalCount += total;
    const box = document.createElement('div');
    box.className = 'score-box ' + s;
    box.innerHTML = `<div class="name">${SUBJECT_NAME[s]}</div><div class="val">${correct}/${total}</div><div class="sub">${Math.round(correct/total*100)}점</div>`;
    scoreGrid.appendChild(box);
  });
  const totalBox = document.createElement('div');
  totalBox.className = 'score-box total';
  totalBox.innerHTML = `<div class="name">총점</div><div class="val">${totalCorrect}/${totalCount}</div><div class="sub">${totalCount? Math.round(totalCorrect/totalCount*100):0}점</div>`;
  scoreGrid.appendChild(totalBox);

  // 리뷰 리스트
  const reviewList = document.getElementById('reviewList');
  reviewList.innerHTML = '';
  let curSubject = null;
  reviewRows.forEach(row=>{
    if(row.subject !== curSubject){
      curSubject = row.subject;
      const t = document.createElement('div');
      t.className = 'section-title';
      t.dataset.s = curSubject;
      t.innerHTML = `<span class="dot"></span>${SUBJECT_NAME[curSubject]} 채점 내역`;
      reviewList.appendChild(t);
    }
    const item = document.createElement('div');
    item.className = 'review-item ' + (row.isCorrect ? 'ok' : 'bad');
    item.innerHTML = `
      <div class="mark">${row.isCorrect ? 'O' : 'X'}</div>
      <div class="qt">
        <div>${row.index+1}. ${escapeHtml(row.q)}</div>
        <div class="ans">내 답: <b class="${row.isCorrect?'correct':''}">${escapeHtml(row.userDisplay)}</b>${row.isCorrect?'':` / 정답: <b class="correct">${escapeHtml(row.correctDisplay)}</b>`}</div>
      </div>`;
    reviewList.appendChild(item);
  });

  show('screenResult');
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ===================== 이미지 저장 ===================== */
document.getElementById('saveImgBtn').addEventListener('click', async ()=>{
  const target = document.getElementById('resultCapture');
  const btn = document.getElementById('saveImgBtn');
  btn.disabled = true;
  btn.textContent = '이미지 생성 중...';
  try{
    const canvas = await html2canvas(target, {scale:2, backgroundColor:'#ffffff'});
    const link = document.createElement('a');
    const name = document.getElementById('studentName').value.trim() || '학생';
    link.download = `기초학력_채점결과_${name}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e){
    alert('이미지 저장 중 오류가 발생했습니다: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🖼️ 채점 결과 이미지로 저장';
  }
});

/* ===================== 다시 풀기 ===================== */
document.getElementById('retryBtn').addEventListener('click', ()=>{
  if(!confirm('새로운 문제로 다시 시작할까요? 현재 답안은 초기화됩니다.')) return;
  show('screenStart');
  window.scrollTo({top:0});
});

/* ===================== 유틸: 화면 전환 ===================== */
function show(id){
  ['screenStart','screenQuiz','screenResult'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}
</script>
